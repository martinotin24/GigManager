name: Deploy and Notify

on:
  push:
    branches:
      - main

jobs:
  notify-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Enviar Webhook a DigitalOcean Functions
        run: |
          curl -X POST https://faas-sfo3-7872a1dd.doserverless.co/api/v1/web/fn-f807d59b-1060-4215-aaad-7564826c7dbd/default/github-deploy-logger \
          -H "Content-Type: application/json" \
          -d '{"repository": {"name": "${{ github.repository }}"}, "event": "push"}'

      - name: Ejecutar comandos en el Droplet via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd /var/www/GigManager-FullStack
            git pull origin main
            cd Gigmanager-backend
            npm install --production
            pm2 restart gigmanager || pm2 start server.js --name "gigmanager"